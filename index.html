        content: `# React 18 新特性完全解析

React 18 是自 React 17 以来最大的版本更新，带来了许多令人兴奋的新特性。本文将深入探讨这些新特性及其使用方法。

## 并发渲染（Concurrent Rendering）

并发渲染是 React 18 最重要的改进之一。它允许 React 同时准备多个版本的 UI。这意味着 React 可以：

- 在不阻塞主线程的情况下渲染大型列表
- 自动调整渲染优先级
- 更智能地处理用户交互

## Suspense 升级

\`\`\`tsx
import { Suspense } from 'react';
import { lazy } from 'react';

const HeavyComponent = lazy(() => import('./HeavyComponent'));

function App() {
  return (
    <Suspense fallback={<div>加载中...</div>}>
      <HeavyComponent />
    </Suspense>
  );
}
\`\`\`

## 自动批处理（Automatic Batching）

在 React 18 之前，只有 React 事件处理函数中的 \`setState\` 才会被批处理。现在，所有 \`setState\` 都会被自动批处理，包括 \`fetch\` 回调和 \`setTimeout\`。

\`\`\`jsx
// React 18 之前：两次渲染
setTimeout(() => {
  setCount(c => c + 1);
  setFlag(f => !f);
}, 1000);

// React 18：一次渲染
setTimeout(() => {
  setCount(c => c + 1);
  setFlag(f => !f);
}, 1000);
\`\`\`

## 新的 Hooks

### useId

用于生成唯一的 ID：

\`\`\`jsx
function Checkbox() {
  const id = useId();
  return (
    <div>
      <input type="checkbox" id={id} />
      <label htmlFor={id}>同意条款</label>
    </div>
  );
}
\`\`\`

### useTransition

用于标记非紧急更新：

\`\`\`jsx
function Search() {
  const [isPending, startTransition] = useTransition();
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);

  function handleChange(e) {
    startTransition(() => {
      setQuery(e.target.value);
      searchAPI(e.target.value).then(setResults);
    });
  }

  return <input onChange={handleChange} />;
}
\`\`\`

## 总结

React 18 的这些新特性让构建高性能应用变得更加简单。并发模式虽然默认不启用，但它为 React 的未来发展奠定了坚实基础。

> 建议在实际项目中逐步采用这些新特性，而不是一次性全部迁移。

function log(target: any, key: string, descriptor: PropertyDescriptor) {

  descriptor.value = function(...args: any[]) {

  };
  return descriptor;
}

## Dockerfile 编写

\`\`\`dockerfile
FROM node:20-alpine AS builder
WORKDIR /app
COPY package*.json ./
RUN npm ci --only=production
COPY . .
RUN npm run build

FROM nginx:alpine
COPY --from=builder /app/dist /usr/share/nginx/html
COPY nginx.conf /etc/nginx/nginx.conf
EXPOSE 80
CMD ["nginx", "-g", "daemon off;"]
\`\`\`

## Docker Compose 编排

\`\`\`yaml
version: '3.8'
services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine

volumes:
  postgres_data:
\`\`\`

| 命令 | 说明 |
|------|------|
| docker build | 构建镜像 |
| docker run | 运行容器 |
| docker-compose up | 启动服务 |
| docker logs | 查看日志 |

1. 使用多阶段构建减小镜像体积

算法面试是很多公司招聘的必考环节，这里总结一下高频题型。

## 双指针

适合有序数组去重、两数之和等问题：
\`\`\`typescript
function twoSum(nums: number[], target: number): number[] {
  let left = 0, right = nums.length - 1;
  while (left < right) {
    const sum = nums[left] + nums[right];
    if (sum === target) return [left, right];
    if (sum < target) left++;
    else right--;
  }
  return [];
}
\`\`\`

## 滑动窗口

适合子串、子数组问题：
\`\`\`typescript
function maxSubarraySum(arr: number[], k: number): number {
  let windowSum = 0;
  for (let i = 0; i < k; i++) windowSum += arr[i];
  let maxSum = windowSum;

  for (let i = k; i < arr.length; i++) {
    windowSum += arr[i] - arr[i - k];
    maxSum = Math.max(maxSum, windowSum);
  }
  return maxSum;
}

    // ==================== Markdown 渲染 ====================
    const MarkdownContent = ({ content }) => {
      useEffect(() => {
        if (window.hljs) {
          document.querySelectorAll('pre code').forEach((block) => {
            window.hljs.highlightElement(block);
          });
        }
      }, [content]);

      const renderMarkdown = (text) => {
        const lines = text.split('\n');
        const result = [];
        let i = 0;
        let inCodeBlock = false;
        let codeLines = [];
        let codeLang = '';
        let inTable = false;
        let tableRows = [];

        while (i < lines.length) {
          const line = lines[i];

          // 代码块
          if (line.startsWith('```')) {
            if (!inCodeBlock) {
              inCodeBlock = true;
              codeLang = line.slice(3).trim();
              codeLines = [];
            } else {
              inCodeBlock = false;
              result.push(h('pre', { key: `pre-${i}`, className: 'rounded-lg overflow-x-auto text-sm my-4' },
                h('code', { className: `language-${codeLang}`, key: codeLang }, codeLines.join('\n'))
              ));
              codeLines = [];
            }
            i++;
            continue;
          }

          if (inCodeBlock) {
            codeLines.push(line);
            i++;
            continue;
          }

          // 表格
          if (line.includes('|') && line.trim().startsWith('|')) {
            const cells = line.split('|').filter(c => c.trim() !== '').map(c => c.trim());
            if (cells.every(c => /^-+$/.test(c))) {
              i++;
              continue;
            }
            tableRows.push(cells);
            i++;
            continue;
          } else if (inTable) {
            result.push(
              h('table', { key: `table-${i}`, className: 'w-full border-collapse my-4 text-sm' },
                h('tbody', null,
                  tableRows.map((row, ri) =>
                    h('tr', { key: ri, className: ri === 0 ? 'font-semibold' : '' },
                      row.map((cell, ci) =>
                        ri === 0
                          ? h('th', { key: ci, className: 'border border-gray-300 dark:border-gray-700 px-4 py-2 text-left bg-gray-50 dark:bg-gray-800' }, cell)
                          : h('td', { key: ci, className: 'border border-gray-300 dark:border-gray-700 px-4 py-2' }, cell)
                      )
                    )
                  )
                )
              )
            );
            tableRows = [];
            inTable = false;
            continue;
          }

          // 标题
          if (line.startsWith('# ')) {
            result.push(h('h1', { key: `h1-${i}`, className: 'text-3xl font-bold text-gray-900 dark:text-gray-100 mb-4 mt-8' }, line.slice(2)));
            i++; continue;
          }
          if (line.startsWith('## ')) {
            result.push(h('h2', { key: `h2-${i}`, className: 'text-2xl font-semibold text-gray-900 dark:text-gray-100 mb-3 mt-6' }, line.slice(3)));
            i++; continue;
          }
          if (line.startsWith('### ')) {
            result.push(h('h3', { key: `h3-${i}`, className: 'text-xl font-semibold text-gray-900 dark:text-gray-100 mb-2 mt-5' }, line.slice(4)));
            i++; continue;
          }
          if (line.startsWith('#### ')) {
            result.push(h('h4', { key: `h4-${i}`, className: 'text-lg font-medium text-gray-900 dark:text-gray-100 mb-2 mt-4' }, line.slice(5)));
            i++; continue;
          }

          // 引用
          if (line.startsWith('> ')) {
            result.push(h('blockquote', { key: `quote-${i}`, className: 'border-l-4 border-purple-500 pl-4 italic text-gray-500 dark:text-gray-400 my-4' }, line.slice(2)));
            i++; continue;
          }

          // 分割线
          if (line.match(/^---+$/)) {
            result.push(h('hr', { key: `hr-${i}`, className: 'my-8 border-gray-300 dark:border-gray-700' }));
            i++; continue;
          }

          // 列表
          if (line.match(/^[-*] /)) {
            const items = [];
            while (i < lines.length && lines[i].match(/^[-*] /)) {
              items.push(h('li', { key: i }, renderInline(lines[i].slice(2))));
              i++;
            }
            result.push(h('ul', { key: `ul-${i}`, className: 'list-disc list-inside mb-4 space-y-1' }, items));
            continue;
          }
          if (line.match(/^\d+\. /)) {
            const items = [];
            while (i < lines.length && lines[i].match(/^\d+\. /)) {
              items.push(h('li', { key: i }, renderInline(lines[i].replace(/^\d+\. /, ''))));
              i++;
            }
            result.push(h('ol', { key: `ol-${i}`, className: 'list-decimal list-inside mb-4 space-y-1' }, items));
            continue;
          }

          // 空行
          if (line.trim() === '') {
            i++; continue;
          }

          // 段落
          result.push(h('p', { key: `p-${i}`, className: 'mb-4 leading-relaxed' }, renderInline(line)));
          i++;
        }

        return result;
      };

      const renderInline = (text) => {
        const parts = [];
        let remaining = text;

        while (remaining.length > 0) {
          // 行内代码
          const codeMatch = remaining.match(/`([^`]+)`/);
          if (codeMatch && codeMatch.index !== undefined) {
            if (codeMatch.index > 0) {
              parts.push(remaining.slice(0, codeMatch.index));
            }
            parts.push(h('code', { key: `code-${codeMatch.index}`, className: 'bg-gray-100 dark:bg-gray-800 text-purple-600 dark:text-purple-400 px-1.5 py-0.5 rounded text-sm font-mono' }, codeMatch[1]));
            remaining = remaining.slice(codeMatch.index + codeMatch[0].length);
            continue;
          }
          // 加粗
          const boldMatch = remaining.match(/\*\*([^*]+)\*\*/);
          if (boldMatch && boldMatch.index !== undefined) {
            if (boldMatch.index > 0) {
              parts.push(remaining.slice(0, boldMatch.index));
            }
            parts.push(h('strong', { key: `bold-${boldMatch.index}` }, boldMatch[1]));
            remaining = remaining.slice(boldMatch.index + boldMatch[0].length);
            continue;
          }
          // 链接
          const linkMatch = remaining.match(/\[([^\]]+)\]\(([^)]+)\)/);
          if (linkMatch && linkMatch.index !== undefined) {
            if (linkMatch.index > 0) {
              parts.push(remaining.slice(0, linkMatch.index));
            }
            parts.push(h('a', { key: `link-${linkMatch.index}`, href: linkMatch[2], target: '_blank', rel: 'noopener noreferrer', className: 'text-purple-600 dark:text-purple-400 hover:underline' }, linkMatch[1]));
            remaining = remaining.slice(linkMatch.index + linkMatch[0].length);
            continue;
          }
          // 普通文本
          parts.push(remaining);
          break;
        }

        return parts;
      };

      return h('div', { className: 'prose' }, renderMarkdown(content));
    };

    // ==================== 组件 ====================
    const Header = ({ page, onNavigate, dark, onToggleDark }) => {

                h(Icon, { name: icon, size: 16 }),
                h('span', { className: 'hidden sm:inline' }, label)

            h('button', {

        )

    };

    const Footer = () =>
      h('footer', { className: 'mt-auto border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-[#16171d]' },
        h('div', { className: 'max-w-5xl mx-auto px-4 sm:px-6 py-8' },

    const TagChip = ({ tag, onClick }) =>

    // ==================== 页面 ====================
    const HomePage = ({ onNavigate, posts }) =>
      h('div', null,
        h('section', { className: 'max-w-5xl mx-auto px-4 sm:px-6 py-16 text-center' },

        let updated;
        if (editingPost) {
          updated = posts.map(p => p.id === editingPost ? post : p);
        } else {
          updated = [post, ...posts];

        updated.sort((a, b) => new Date(b.date) - new Date(a.date));
        setPosts(updated);

                className: 'flex-1 px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#16171d] text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500'
              }),
              h('button', {
                onClick: handleAddTag,
                className: 'px-4 py-2 rounded-xl bg-purple-500 text-white text-sm font-medium hover:bg-purple-600'
              }, '添加')
            )
          )
        ),

        // 文章编辑器弹窗
        showEditor && h('div', { className: 'fixed inset-0 bg-black/50 flex items-start justify-center z-50 overflow-y-auto py-8' },
          h('div', { className: 'bg-white dark:bg-[#1e2028] rounded-2xl w-full max-w-3xl mx-4 shadow-xl' },
            h('div', { className: 'flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700' },
              h('h2', { className: 'text-lg font-semibold text-gray-900 dark:text-gray-100' },
                editingPost ? '编辑文章' : '新建文章'
              ),
              h('button', {
                onClick: () => setShowEditor(false),
                className: 'p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'
              }, h(Icon, { name: 'x', size: 20 }))
            ),
            h('div', { className: 'p-4 space-y-4 max-h-[calc(100vh-200px)] overflow-y-auto' },
              h('div', null,
                h('label', { className: 'block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1' }, '标题 *'),
                h('input', {
                  value: form.title,
                  onChange: (e) => setForm({ ...form, title: e.target.value }),
                  placeholder: '输入文章标题',
                  className: 'w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#16171d] text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500'
                })
              ),
              h('div', { className: 'grid grid-cols-2 gap-4' },
                h('div', null,
                  h('label', { className: 'block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1' }, '发布日期'),
                  h('input', {
                    type: 'date',
                    value: form.date,
                    onChange: (e) => setForm({ ...form, date: e.target.value }),
                    className: 'w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#16171d] text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500'
                  })
                ),
                h('div', null,
                  h('label', { className: 'block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1' }, '作者'),
                  h('input', {
                    value: form.author,
                    onChange: (e) => setForm({ ...form, author: e.target.value }),
                    className: 'w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#16171d] text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500'
                  })
                )
              ),
              h('div', null,
                h('label', { className: 'block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1' }, '摘要 *'),
                h('textarea', {
                  value: form.excerpt,
                  onChange: (e) => setForm({ ...form, excerpt: e.target.value }),
                  placeholder: '输入文章摘要（列表页显示）',
                  rows: 2,
                  className: 'w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#16171d] text-gray-900 dark:text-gray-100 resize-none focus:outline-none focus:ring-2 focus:ring-purple-500'
                })
              ),
              h('div', null,
                h('label', { className: 'block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1' },
                  '标签（点击选择）'
                ),
                h('div', { className: 'flex flex-wrap gap-2' },
                  effectiveTags.map(tag =>
                    h('button', {
                      key: tag,
                      onClick: () => toggleFormTag(tag),
                      className: `px-3 py-1 rounded-full text-sm font-medium transition-colors ${form.tags.includes(tag) ? 'bg-purple-500 text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-purple-100 dark:hover:bg-purple-900/30'}`
                    }, form.tags.includes(tag) ? h(Icon, { name: 'check', size: 12, className: 'inline mr-1' }) : null, tag)
                  )
                )
              ),
              h('div', null,
                h('div', { className: 'flex items-center justify-between mb-1' },
                  h('label', { className: 'text-sm font-medium text-gray-700 dark:text-gray-300' }, '正文内容（Markdown） *'),
                  h('span', { className: 'text-xs text-gray-400' }, `约 ${calcReadingTime(form.content)} 分钟阅读`)
                ),
                h('textarea', {
                  value: form.content,
                  onChange: (e) => setForm({ ...form, content: e.target.value }),
                  placeholder: '# 文章标题\n\n正文内容，支持 Markdown 语法...\n\n```js\nconst a = 1;\n```',
                  rows: 14,
                  className: 'w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-[#16171d] text-gray-900 dark:text-gray-100 resize-none focus:outline-none focus:ring-2 focus:ring-purple-500 font-mono text-sm leading-relaxed'
                })
              )
            ),
            h('div', { className: 'flex justify-end gap-3 p-4 border-t border-gray-200 dark:border-gray-700' },
              h('button', {
                onClick: () => setShowEditor(false),
                className: 'px-5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400 font-medium hover:bg-gray-50 dark:hover:bg-gray-800'
              }, '取消'),
              h('button', {
                onClick: handleSave,
                disabled: !form.title.trim() || !form.content.trim(),
                className: 'flex items-center gap-2 px-5 py-2.5 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 text-white font-medium hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed shadow-md'
              }, h(Icon, { name: 'save', size: 16 }), '保存发布')
            )
          )
        ),

        // 删除确认弹窗
        deleteConfirm && h('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50' },
          h('div', { className: 'bg-white dark:bg-[#1e2028] rounded-2xl p-6 w-80 shadow-xl text-center' },
            h('div', { className: 'w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4' },
              h(Icon, { name: 'trash', size: 24, className: 'text-red-500' })
            ),
            h('h3', { className: 'text-lg font-semibold text-gray-900 dark:text-gray-100 mb-2' }, '确认删除'),
            h('p', { className: 'text-gray-500 dark:text-gray-500 mb-6' },
              `确定要删除文章「${deleteConfirm.title}」吗？此操作不可恢复。`
            ),
            h('div', { className: 'flex gap-3' },
              h('button', {
                onClick: () => setDeleteConfirm(null),
                className: 'flex-1 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400 font-medium'
              }, '取消'),
              h('button', {
                onClick: () => handleDelete(deleteConfirm.id),
                className: 'flex-1 py-2.5 rounded-xl bg-red-500 text-white font-medium hover:bg-red-600'
              }, '删除')
            )
          )
        )
      );
    };

    // ==================== App ====================
    const App = () => {
      const [dark, setDark] = useState(() => {
        const stored = localStorage.getItem('blog-dark');
        if (stored !== null) return stored === 'true';
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
      });
      const [page, setPage] = useState('home');
      const [param, setParam] = useState(null);
      const [selectedTag, setSelectedTag] = useState(null);
      const [posts, setPosts] = useState(() => loadPosts());

      useEffect(() => {
        if (dark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        localStorage.setItem('blog-dark', dark);
      }, [dark]);

      // Hash 路由
      useEffect(() => {
        const handleHash = () => {
          const hash = window.location.hash.slice(1) || '/';
          if (hash === '/' || hash === '') {
            setPage('home');
            setParam(null);
          } else if (hash.startsWith('/post/')) {
            setPage('post');
            setParam(hash.replace('/post/', ''));
          } else if (hash === '/tags') {
            setPage('tags');
          } else if (hash === '/about') {
            setPage('about');
          } else if (hash === '/admin') {
            setPage('admin');
          } else {
            setPage('home');
          }
        };
        window.addEventListener('hashchange', handleHash);
        handleHash();
        return () => window.removeEventListener('hashchange', handleHash);
      }, []);

      const navigate = (target, p) => {
        if (target === 'home') {
          window.location.hash = '/';
          setPage('home');
          setParam(null);
          setSelectedTag(null);
        } else if (target === 'post') {
          window.location.hash = `/post/${p}`;
          setPage('post');
          setParam(p);
        } else if (target === 'tags') {
          window.location.hash = '/tags';
          setPage('tags');
          if (p) setSelectedTag(p);
        } else if (target === 'about') {
          window.location.hash = '/about';
          setPage('about');
        } else if (target === 'admin') {
          window.location.hash = '/admin';
          setPage('admin');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const goBack = () => {
        window.history.back();
      };

      return h('div', { className: 'min-h-screen flex flex-col bg-white dark:bg-[#16171d]' },
        h(Header, { page, onNavigate: navigate, dark, onToggleDark: () => setDark(!dark), isAdmin: page === 'admin' }),
        h('main', { className: 'flex-1' },
          page === 'home' && h(HomePage, { onNavigate: navigate, posts }),
          page === 'post' && h(PostPage, { postId: param, onBack: goBack, onNavigate: navigate, posts }),
          page === 'tags' && h(TagsPage, { selectedTag, onSelectTag: (tag) => { setSelectedTag(tag); window.scrollTo({ top: 0 }); }, onNavigate: navigate, posts }),
          page === 'about' && h(AboutPage),
          page === 'admin' && h(AdminPage, {
            posts,
            setPosts,
            allTags,
            onNavigate: navigate,
            onLogout: () => navigate('home')
          })
        ),
        page !== 'admin' && h(Footer)
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
